name: Build Windows

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.44.4'

jobs:
  build-windows:
    name: Build Windows (.exe & .msix)
    runs-on: windows-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🎉 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 📦 Get Dependencies
        run: flutter pub get

      - name: 🔨 Generate Build Runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: 🔍 Analyze (errors only)
        run: flutter analyze lib/ --no-fatal-infos --no-fatal-warnings

      - name: 🧪 Test
        run: flutter test

      - name: 🏗️ Build Windows (Release)
        run: flutter build windows --release

      - name: 📦 Archive Build
        uses: actions/upload-artifact@v4
        with:
          name: signal-protocol-demo-windows
          path: build/windows/x64/runner/Release/
          retention-days: 30

      - name: 🏷️ Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/windows/x64/runner/Release/*.exe
          draft: true
          generate_release_notes: true
